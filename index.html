<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Food Delivery Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>🍽 Restaurant Menu</h2>
</header>

<!-- Categories -->
<div class="categories">
  <button onclick="filter('all')">Hammasi</button>
  <button onclick="filter('salat')">Salatlar</button>
  <button onclick="filter('sup')">Sup</button>
  <button onclick="filter('hot')">Issiq ovqat</button>
</div>

<!-- Products -->
<div id="products" class="grid"></div>

<!-- CART -->
<div class="cart">
  <h3>🛒 Korzina</h3>
  <div id="cartItems"></div>
  <h4>Jami: <span id="total">0</span> som</h4>

  <button onclick="checkout()">Oformit qilish</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="checkout hidden">
  <h2>📦 Oformit zakaz</h2>

  <input placeholder="+996 telefon" />
  <input placeholder="Adres" />
  <textarea placeholder="Izoh"></textarea>

  <button onclick="alert('Zakaz qabul qilindi!')">Tasdiqlash</button>
</div>

<script src="script.js"></script>
</body>
</html>
